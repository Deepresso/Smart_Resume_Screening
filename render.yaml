services:
  - type: web
    name: smart-resume-screening
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 1
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smart-resume-db
          property: connectionString

databases:
  - name: smart-resume-db
    databaseName: smart_resume
    plan: free
