<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartResume{% endblock %} — HR Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231e293b'/><text x='16' y='23' font-family='Arial,sans-serif' font-size='20' font-weight='bold' fill='%23ea580c' text-anchor='middle'>S</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-wrapper">
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()">&#9776;</button>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">&#x1F4CB;</div>
            <div>
                <div class="sidebar-brand-name">SmartResume</div>
                <div class="sidebar-brand-sub">HR Portal</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">Main</div>
            <a href="{{ url_for('hr_dashboard') }}" class="nav-item {% if request.endpoint == 'hr_dashboard' %}active{% endif %}">
                <span class="nav-item-icon">&#x1F4CA;</span>
                <span>Dashboard</span>
            </a>
            <a href="{{ url_for('hr_jobs') }}" class="nav-item {% if request.endpoint in ['hr_jobs','hr_new_job'] %}active{% endif %}">
                <span class="nav-item-icon">&#x1F4CB;</span>
                <span>Job Postings</span>
            </a>
            <a href="{{ url_for('hr_candidates') }}" class="nav-item {% if request.endpoint == 'hr_candidates' %}active{% endif %}">
                <span class="nav-item-icon">&#x1F465;</span>
                <span>Candidates</span>
            </a>
            <a href="{{ url_for('hr_screening_index') }}" class="nav-item {% if request.endpoint in ['hr_screening_index','hr_screening_results'] %}active{% endif %}">
                <span class="nav-item-icon">&#x2728;</span>
                <span>Screening Results</span>
            </a>
            <div class="sidebar-section">Management</div>
            <a href="{{ url_for('hr_user_management') }}" class="nav-item {% if request.endpoint in ['hr_user_management','hr_edit_user'] %}active{% endif %}">
                <span class="nav-item-icon">&#x1F464;</span>
                <span>User Management</span>
            </a>
            <a href="{{ url_for('hr_settings') }}" class="nav-item {% if request.endpoint == 'hr_settings' %}active{% endif %}">
                <span class="nav-item-icon">&#x2699;&#xFE0F;</span>
                <span>Settings</span>
            </a>
            <a href="{{ url_for('logout') }}" class="nav-item" style="margin-top:4px;">
                <span class="nav-item-icon">&#x1F6AA;</span>
                <span>Logout</span>
            </a>
        </nav>
        <div class="sidebar-user">
            <div class="user-avatar">{{ current_user.name[:2].upper() }}</div>
            <div>
                <div class="user-name">{{ current_user.name }}</div>
                <div class="user-role">HR Manager</div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
}
</script>
</body>
</html>
