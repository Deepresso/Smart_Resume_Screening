<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 &mdash; Page Not Found</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); margin:0; }
        .error-box { text-align:center; padding:60px 40px; }
        .error-code { font-size:96px; font-weight:900; color:var(--blue); line-height:1; margin-bottom:8px; }
        .error-title { font-size:22px; font-weight:700; color:var(--navy); margin-bottom:8px; }
        .error-sub { color:var(--text-muted); font-size:14px; margin-bottom:32px; }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-code">404</div>
        <div class="error-title">Page Not Found</div>
        <div class="error-sub">The page you are looking for does not exist or has been moved.</div>
        <a href="{{ url_for('login') }}" class="btn btn-primary">Go to Home</a>
    </div>
</body>
</html>
